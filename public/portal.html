<!DOCTYPE html>
<html lang="es" class="scroll-smooth bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Cliente - Conexiones Argentinas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], montserrat: ['Montserrat', 'sans-serif'] },
                    colors: { brand: { cobalt: '#0A4B8F', lightblue: '#4EA6E0', navy: '#1A202C' } }
                }
            }
        }
    </script>
    <style>
        .bg-waves {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(211,100%,74%,0.15) 0px, transparent 50%),
                              radial-gradient(at 100% 0%, hsla(211,100%,74%,0.15) 0px, transparent 50%);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0A4B8F;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-brand-navy font-sans antialiased min-h-screen bg-waves flex flex-col">

    <!-- Header Mini -->
    <header class="w-full px-6 py-4 bg-white/80 backdrop-blur-md border-b border-gray-200 flex justify-between items-center shadow-sm">
        <div class="flex items-center text-[#1a3b5c]">
            <img src="img/logo.png" alt="Conexiones Argentinas Internet" style="height: 50px; width: auto;" class="object-contain">
        </div>
        <a href="index.html" class="text-sm font-semibold text-brand-cobalt hover:underline">Volver a la Web</a>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        
        <!-- VISTA DE LOGIN -->
        <div id="login-view" class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl border border-gray-100 transition-all duration-500">
            <h2 class="text-2xl font-montserrat font-bold text-center mb-2">Portal de Cliente</h2>
            <p class="text-gray-500 text-center text-sm mb-8">Ingresa tus datos para gestionar tu servicio</p>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">DNI (Sin puntos)</label>
                    <input type="number" id="dni" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-brand-cobalt focus:border-brand-cobalt outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-brand-cobalt focus:border-brand-cobalt outline-none transition-all">
                </div>
                
                <div id="login-error" class="hidden text-red-500 text-sm text-center bg-red-50 p-3 rounded-lg border border-red-100"></div>

                <button type="submit" id="btn-login" class="w-full bg-brand-cobalt text-white font-bold py-3 px-4 rounded-xl shadow-md hover:bg-[#003870] transition-colors flex justify-center items-center h-12">
                    <span id="btn-login-text">Ingresar al Portal</span>
                    <div id="btn-login-spinner" class="loader hidden"></div>
                </button>
            </form>
        </div>

        <!-- VISTA DE DASHBOARD (Oculta al inicio) -->
        <div id="dashboard-view" class="hidden w-full max-w-5xl mx-auto flex-col space-y-6 transition-all duration-500">
            
            <div class="flex justify-between items-end mb-4">
                <div>
                    <h1 class="text-3xl font-montserrat font-bold text-brand-navy">Hola, <span id="dash-nombre">Cliente</span> 👋</h1>
                    <p class="text-gray-500 mt-1" id="dash-direccion">Cargando dirección...</p>
                </div>
                <button id="btn-logout" class="text-red-500 hover:text-red-700 font-semibold text-sm flex items-center bg-white px-4 py-2 rounded-full shadow-sm border border-gray-200">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Cerrar Sesión
                </button>
            </div>

            <!-- Grid de Tarjetas -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <!-- Tarjeta Estado del Servicio -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-brand-cobalt">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"></path></svg>
                            </div>
                            <span id="dash-estado-badge" class="px-3 py-1 text-xs font-bold rounded-full bg-gray-100 text-gray-500">Cargando...</span>
                        </div>
                        <h3 class="text-gray-500 text-sm font-medium">Estado del Servicio</h3>
                        <p class="text-2xl font-bold text-brand-navy mt-1" id="dash-estado-texto">-</p>
                    </div>
                </div>

                <!-- Tarjeta Saldo Pendiente -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 md:col-span-2 flex flex-col justify-between relative overflow-hidden">
                    <div class="absolute right-0 top-0 w-32 h-32 bg-blue-50 rounded-bl-full -z-0"></div>
                    <div class="relative z-10">
                        <h3 class="text-gray-500 text-sm font-medium mb-1">Deuda Total Pendiente</h3>
                        <div class="flex items-end gap-3 mb-6">
                            <p class="text-4xl font-bold text-brand-navy" id="dash-saldo">$ 0,00</p>
                            <p class="text-sm text-gray-400 mb-1" id="dash-facturas-count">0 facturas</p>
                        </div>
                        
                        <div id="dash-facturas-list" class="space-y-3 mb-4 max-h-40 overflow-y-auto pr-2">
                            <!-- Facturas se insertan aquí via JS -->
                        </div>

                        <div id="btn-pagar-container" class="hidden mt-4">
                            <!-- Botón generado via JS para facturas -->
                        </div>
                    </div>
                </div>

            </div>

            <!-- Tarjeta Historial de Pagos -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mt-6">
                <h3 class="text-gray-500 text-sm font-medium mb-4">Historial de Facturas Pagadas</h3>
                <div id="dash-historial-list" class="space-y-3 max-h-60 overflow-y-auto pr-2">
                    <!-- Historial se inserta aquí via JS -->
                    <div class="text-sm text-gray-400 italic">Cargando historial...</div>
                </div>
            </div>

        </div>

    </main>

    <footer class="text-center py-6 text-gray-400 text-sm">
        &copy; 2026 Conexiones Argentinas.
    </footer>

    <script src="js/portal.js"></script>
</body>
</html>
